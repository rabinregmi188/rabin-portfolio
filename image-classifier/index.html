<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Classifier — Vision Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #040810;
      --s1:      #080f1e;
      --s2:      #0d1730;
      --s3:      #152040;
      --border:  rgba(57,226,255,0.1);
      --border2: rgba(57,226,255,0.25);
      --cyan:    #39e2ff;
      --violet:  #8969ff;
      --pink:    #ff5db1;
      --lime:    #b3ff69;
      --text:    #edf3ff;
      --muted:   #7090b8;
      --dim:     #3a5070;
    }
    html,body { height:100%; overflow:hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height:100vh; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--s3); border-radius:4px; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes scanline {
      0%   { top: -2px; }
      100% { top: 100%; }
    }
    @keyframes barIn {
      from { width:0; }
    }
    @keyframes pulseRing {
      0%,100% { box-shadow: 0 0 0 0 rgba(57,226,255,0.3); }
      50%     { box-shadow: 0 0 0 12px rgba(57,226,255,0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fade-up { animation: fadeUp .3s ease forwards; }
    input,button,textarea { font-family:inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="./classifier.jsx"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
