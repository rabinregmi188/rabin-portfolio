<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* Sidebar — dark */
      --sb-bg:    #141220;
      --sb-s1:    #1c1928;
      --sb-s2:    #232030;
      --sb-border:rgba(255,255,255,0.07);
      --sb-text:  #c8c3e0;
      --sb-muted: #6b6485;
      /* Editor — light */
      --ed-bg:    #ffffff;
      --ed-s1:    #f7f8fa;
      --ed-border:#e8eaed;
      --ed-text:  #111318;
      --ed-text2: #6b7280;
      --ed-muted: #9ca3af;
      /* Accent */
      --cyan:     #06b6d4;
      --cyan-l:   #22d3ee;
      --cyan-d:   rgba(6,182,212,0.1);
      --green:    #10b981;
      --red:      #ef4444;
      --amber:    #f59e0b;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--sb-bg); color: var(--ed-text); font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .2s ease forwards; }

    input, textarea, button, select { font-family: inherit; }
    textarea:focus, input:focus { outline: 2px solid var(--cyan); outline-offset: 1px; }

    /* Markdown preview */
    .preview-body { font-size: 15px; line-height: 1.8; color: var(--ed-text); }
    .preview-body h1 { font-size: 1.7em; font-weight: 800; margin: 0 0 .5em; letter-spacing: -.02em; color: var(--ed-text); }
    .preview-body h2 { font-size: 1.25em; font-weight: 700; margin: .9em 0 .4em; color: var(--ed-text); }
    .preview-body h3 { font-size: 1.05em; font-weight: 700; margin: .7em 0 .3em; }
    .preview-body p  { margin: 0 0 .8em; }
    .preview-body ul,.preview-body ol { margin: 0 0 .8em; padding-left: 1.4em; }
    .preview-body li { margin-bottom: .3em; }
    .preview-body strong { font-weight: 700; }
    .preview-body em { font-style: italic; color: var(--ed-text2); }
    .preview-body code { font-family:'JetBrains Mono',monospace; font-size:.83em; background:rgba(6,182,212,0.08); border:1px solid rgba(6,182,212,0.15); padding:1px 6px; border-radius:4px; color:var(--cyan); }
    .preview-body pre { background:#111318; border-radius:10px; padding:16px; margin:0 0 .8em; overflow-x:auto; }
    .preview-body pre code { background:none; border:none; padding:0; color:#e2e8f0; font-size:.84em; }
    .preview-body blockquote { border-left:3px solid var(--cyan); margin:0 0 .8em; padding:.5em 1em; background:var(--cyan-d); border-radius:0 8px 8px 0; color:var(--ed-text2); font-style:italic; }
    .preview-body hr { border:0; border-top:1px solid var(--ed-border); margin:1em 0; }
    .preview-body a { color:var(--cyan); text-decoration:underline; text-underline-offset:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./app.jsx"></script>
</body>
</html>
