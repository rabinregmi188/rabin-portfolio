<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartNotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #f2ede3;
      --surface:  #faf8f2;
      --surface2: #f5f0e6;
      --border:   rgba(90,65,40,0.12);
      --border2:  rgba(90,65,40,0.22);
      --accent:   #b85c2a;
      --accent-l: #d4783e;
      --accent-d: rgba(184,92,42,0.1);
      --text:     #1c1309;
      --text2:    #6b5744;
      --muted:    #9e8b79;
      --green:    #2d7a4f;
      --red:      #c0392b;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }
    h1,h2,h3 { font-family: 'Lora', Georgia, serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .25s ease forwards; }
    textarea, input, select, button { font-family: inherit; }
    textarea:focus, input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .preview-body h1 { font-family:'Lora',Georgia,serif; font-size:1.6em; margin:0 0 .6em; line-height:1.2; color:var(--text); }
    .preview-body h2 { font-family:'Lora',Georgia,serif; font-size:1.2em; margin:.8em 0 .4em; color:var(--text); }
    .preview-body h3 { font-family:'Lora',Georgia,serif; font-size:1em; margin:.6em 0 .3em; color:var(--text); }
    .preview-body p  { margin:0 0 .8em; line-height:1.75; color:var(--text); }
    .preview-body ul,.preview-body ol { margin:0 0 .8em; padding-left:1.4em; }
    .preview-body li { margin-bottom:.3em; line-height:1.65; }
    .preview-body strong { font-weight:700; color:var(--text); }
    .preview-body em { font-style:italic; }
    .preview-body code { font-family:'JetBrains Mono',monospace; font-size:.85em; background:rgba(90,65,40,0.08); padding:2px 6px; border-radius:4px; }
    .preview-body pre { background:rgba(90,65,40,0.07); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin:0 0 .8em; overflow-x:auto; }
    .preview-body pre code { background:none; padding:0; }
    .preview-body blockquote { border-left:3px solid var(--accent); margin:0 0 .8em; padding:.5em 1em; background:var(--accent-d); border-radius:0 8px 8px 0; font-style:italic; color:var(--text2); }
    .preview-body hr { border:0; border-top:1px solid var(--border2); margin:1em 0; }
    .preview-body a { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./app.jsx"></script>
</body>
</html>
